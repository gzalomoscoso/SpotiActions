<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyIOSapps | Engineering & Design Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f0f0f;         /* Fondo gris oscuro profundo */
            --card-bg: #1a1a1a;         /* Tarjetas gris un poco más claro */
            --border-color: #2a2a2a;    /* Bordes sutiles */
            --text-primary: #ffffff;
            --text-secondary: #a1a1a1;
            --purple-accent: #a855f7;   /* Morado Seera */
            --font-main: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .layout-wrapper {
            display: flex;
            width: 100%;
            max-width: 1100px;
            padding: 100px 24px;
            gap: 80px;
            z-index: 1;
        }

        /* --- FRAME IZQUIERDO: Descripción --- */
        .left-frame {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Indicador de Status */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--purple-accent);
            margin-bottom: 24px;
            background: rgba(168, 85, 247, 0.1);
            padding: 6px 14px;
            border-radius: 100px;
            width: fit-content;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        h1 {
            font-size: 64px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -0.05em;
            margin-bottom: 30px;
            background: linear-gradient(to bottom, #fff 50%, #71717a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 span {
            color: var(--purple-accent);
            -webkit-text-fill-color: var(--purple-accent);
        }

        .main-description {
            font-size: 19px;
            line-height: 1.6;
            color: var(--text-secondary);
            max-width: 460px;
        }

        .main-description strong {
            color: #fff;
            font-weight: 600;
        }

        /* Efecto Glow de fondo */
        .glow-effect {
            position: absolute;
            top: -120px;
            left: -120px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, rgba(15, 15, 15, 0) 70%);
            z-index: -1;
            filter: blur(50px);
            pointer-events: none;
        }

        /* --- FRAME DERECHO: Tarjetas --- */
        .right-frame {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-secondary);
            margin-bottom: 16px;
            opacity: 0.7;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 32px;
            border-radius: 20px;
            text-decoration: none;
            display: block;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            border-color: var(--purple-accent);
            transform: translateY(-5px) scale(1.01);
            background-color: #1e1e1e;
        }

        .card h3 {
            font-size: 22px;
            font-weight: 700;
            color: var(--purple-accent);
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        .card p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .layout-wrapper {
                flex-direction: column-reverse; /* Proyectos arriba en móvil */
                padding: 60px 24px;
                gap: 50px;
            }

            .left-frame {
                text-align: left;
            }

            h1 {
                font-size: 48px;
            }

            .main-description {
                font-size: 17px;
            }
        }
    </style>
</head>

        <section class="left-frame">
            <div class
