<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyIOSapps | Engineering & Security Lab</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #00ff41; 
            --accent-glow: rgba(0, 255, 65, 0.4);
            --text-main: #ffffff;
            --text-dim: #86868b;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden; /* Evita scroll innecesario para mantener el feeling de app */
            -webkit-font-smoothing: antialiased;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%; 
            height: 100%;
            z-index: 1;
        }

        .main-content {
            position: relative;
            z-index: 10;
            display: flex;
            height: 100vh;
            align-items: center;
            padding: 0 80px;
        }

        .hero {
            max-width: 500px;
        }

        .hero-brand {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--accent);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .status-dot {
            height: 6px;
            width: 6px;
            background-color: var(--accent);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 12px var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.4; }
            100% { transform: scale(0.9); opacity: 1; }
        }

        .hero h1 {
            font-size: 64px;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Botón Estilo Portfolio */
        .btn-portfolio {
            display: inline-block;
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 18px 32px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn-portfolio:hover {
            background: rgba(0, 255, 65, 0.05);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        /* MyIOSApps centralizado en la nube */
        .brand-center {
            position: fixed;
            right: 20%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
            pointer-events: none;
        }

        .brand-center h2 {
            font-size: 120px;
            font-weight: 800;
            letter-spacing: -0.05em;
            opacity: 0.15;
            color: var(--accent);
            filter: blur(2px);
        }

        @media (max-width: 900px) {
            .main-content { padding: 40px; justify-content: center; text-align: center; }
            .hero { max-width: 100%; }
            .brand-center { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="brand-center">
        <h2>MyIOSApps</h2>
    </div>

    <div class="main-content">
        <header class="hero">
            <div class="hero-brand">
                <span class="status-dot"></span> Engineering Lab
            </div>
            <h1>Security & <br>Development</h1>
            <p>Soluciones de infraestructura crítica y software nativo bajo estándares de seguridad de alto nivel.</p>
            
            <a href="https://gzalomoscoso.github.io/articulos/portafolio.html" class="btn-portfolio">
                GONZALO MOSCOSO PORTFOLIO
            </a>
        </header>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        // Alta velocidad y densidad
        const particleCount = 2200; 
        const baseSpeed = 0.8; // Velocidad incrementada

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }

        class Particle {
            constructor() {
                // Enfocadas en el área de la marca (derecha)
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.2 + 0.1;
                // Velocidad mayor
                this.vx = (Math.random() - 0.5) * baseSpeed;
                this.vy = (Math.random() - 0.5) * baseSpeed;
                this.alpha = Math.random() * 0.6 + 0.1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#00ff41';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
